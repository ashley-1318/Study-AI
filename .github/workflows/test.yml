name: StudyAI Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: "0 2 * * *"

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Run unit tests with pytest
        run: |
          cd study-ai
          pytest tests/ \
            --verbose \
            --cov=backend \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --junit-xml=test-results.xml \
            -m "not slow and not e2e"

      - name: Run integration tests
        run: |
          cd study-ai
          pytest tests/ \
            --verbose \
            -m "integration"
        continue-on-error: true

      - name: Run benchmarks
        run: |
          cd study-ai
          pytest tests/benchmarks/ \
            --benchmark-only \
            --benchmark-json=benchmark-results.json
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./study-ai/coverage.xml
          flags: unittests
          name: codecov-${{ matrix.python-version }}
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            study-ai/test-results.xml
            study-ai/htmlcov/
            study-ai/benchmark-results.json

      - name: Check test coverage threshold
        run: |
          cd study-ai
          coverage report --fail-under=70
        continue-on-error: true

  e2e-test:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Start backend server
        run: |
          cd study-ai/backend
          python main.py &
          sleep 10  # Wait for server to start
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Run E2E tests
        run: |
          cd study-ai
          pytest tests/ -v -m "e2e"
        continue-on-error: true

      - name: Stop backend server
        run: |
          pkill -f "python main.py" || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r study-ai/backend/ -f json -o bandit-report.json
        continue-on-error: true

      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        with:
          name: security-scan
          path: bandit-report.json

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mypy types-requests

      - name: Run mypy
        run: |
          mypy study-ai/backend/ --ignore-missing-imports
        continue-on-error: true
